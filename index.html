<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afsana Mimi | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #000;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 14px;
      opacity: 0.8;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 16px;
      color: #666;
    }

    .portfolio-section {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }

    .portfolio-section h3 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .iframe-container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    .cta {
      text-align: center;
      margin-top: 20px;
    }

    .cta a {
      display: inline-block;
      background: #000;
      color: #fff;
      padding: 12px 25px;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }

    .cta a:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Afsana Mimi</h1>
    <p>Marketing Executive & Graphic Designer</p>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Creative Portfolio</h2>
    <p>Branding • Fashion Design • Marketing Visuals</p>
  </section>

  <!-- Portfolio Section -->
  <section class="portfolio-section">
    <h3>My Work</h3>

    <div class="iframe-container">
      <iframe 
        src="https://www.jotform.com/app/260970338955468?appEmbedded=1">
      </iframe>
    </div>

    <div class="cta">
      <a href="https://www.jotform.com/app/260970338955468" target="_blank">
        Open Full Portfolio
      </a>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    © 2026 Afsana Mimi | All Rights Reserved
  </footer>

</body>
</html>
